<!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tenren Playtest</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
            background: #0A0A12;
      color: #e2e8f0;
            font-family: 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
}
    h1 {
            font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
              -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
}
    .subtitle {
            color: #94a3b8;
      font-size: 0.95rem;
      margin-bottom: 40px;
}
    .builds {
            width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .build-card {
            display: block;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 20px;
      text-decoration: none;
      color: #e2e8f0;
            transition: background 0.2s, border-color 0.2s;
}
    .build-card:hover {
            background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.2);
    }
    .build-card .name {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .build-card .desc {
      font-size: 0.85rem;
      color: #94a3b8;
    }
    .build-card .tag {
      display: inline-block;
      margin-top: 8px;
      padding: 2px 10px;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 700;
      background: rgba(96,165,250,0.15);
      color: #60a5fa;
    }
    .empty-state {
            text-align: center;
      padding: 40px 20px;
      color: #64748b;
      font-size: 0.95rem;
      border: 1px dashed rgba(255,255,255,0.1);
      border-radius: 12px;
}
    .footer {
            margin-top: 60px;
      text-align: center;
      color: #475569;
      font-size: 0.8rem;
}
  </style>
    </head>
    <body>
      <h1>Tenren Playtest</h1>
      <p class="subtitle">StudentNinja Combat Arena - Mobile Testing</p>
      <div class="builds">
        <div class="empty-state">
          No builds deployed yet.<br>Check back soon.
        </div>
    <!-- TEMPLATE: copy this block for each new build
    <a href="arena-v1.html" class="build-card">
      <div class="name">Arena v1.0 - Multi-Element</div>
      <div class="desc">Full combat arena with Air, Water, Earth, Fire kits</div>
          <span class="tag">LATEST</span>
        </a>
        -->
      </div>
      <div class="footer">StudentNinja Phase 2 - Internal Playtest</div>
    </body>
    </html>
